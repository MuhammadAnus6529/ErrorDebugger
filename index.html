<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ErrorDebugger_6529AA // Interactive Diagnostic Console</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        /* Premium Custom Scrollbars */
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: #030712; }
        ::-webkit-scrollbar-thumb { background: #1f2937; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #374151; }

        /* Smooth sequential cascading fade-in for code lines */
        @keyframes lineCascade {
            from { opacity: 0; transform: translateY(6px); filter: blur(1px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }
        .animate-cascade {
            animation: lineCascade 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* Line glow styling for error detection */
        .line-fault-highlight {
            background: linear-gradient(90deg, rgba(239, 68, 68, 0.12) 0%, rgba(239, 68, 68, 0.02) 85%, transparent 100%);
            border-left: 3px solid #ef4444;
            box-shadow: inset 2px 0 10px rgba(239, 68, 68, 0.05);
        }

        /* Micro-interaction interactive tooltip styling */
        .diagnostic-tooltip {
            visibility: hidden;
            opacity: 0;
            position: absolute;
            bottom: 120%;
            left: 32px;
            transform: scale(0.96) translateY(4px);
            transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 100;
        }
        .line-fault-highlight:hover .diagnostic-tooltip {
            visibility: visible;
            opacity: 1;
            transform: scale(1) translateY(0);
        }
    </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen flex flex-col font-sans antialiased selection:bg-rose-500/30 selection:text-rose-200">

    <header class="border-b border-gray-900 bg-gray-950/80 px-6 py-4 flex justify-between items-center sticky top-0 z-50 backdrop-blur-md shadow-sm">
        <div class="flex items-center space-x-3">
            <div class="h-2 w-2 bg-rose-500 rounded-sm shadow-[0_0_10px_#ef4444] animate-ping"></div>
            <h1 class="text-xs font-mono font-black tracking-widest text-gray-300 uppercase">
                ErrorDebugger_<span class="text-rose-500 font-bold">6529AA</span> <span class="text-[9px] px-1.5 py-0.5 bg-gray-900 border border-gray-800 rounded text-gray-500 tracking-normal font-sans ml-2">v1.0-Live</span>
            </h1>
        </div>
        <button id="triggerScanBtn" class="px-5 py-2 bg-gradient-to-r from-rose-600 to-orange-600 hover:from-rose-500 hover:to-orange-500 text-gray-950 font-extrabold rounded-xl text-xs uppercase tracking-wider transition-all duration-300 shadow-[0_0_20px_rgba(239,68,68,0.2)] active:scale-98 cursor-pointer">
            ⚡ Run Deep Diagnosis
        </button>
    </header>

    <section class="bg-gray-900/20 border-b border-gray-900/60 p-4 grid grid-cols-3 max-w-7xl w-full mx-auto gap-4">
        <div class="bg-gray-900/30 border border-gray-900 rounded-xl p-3 flex flex-col items-center justify-center backdrop-blur-sm">
            <span class="text-[10px] uppercase tracking-widest font-mono text-gray-500 font-bold">Total Discovered</span>
            <span id="statDiscovered" class="text-xl font-black font-mono text-gray-200 mt-0.5">0</span>
        </div>
        <div class="bg-gray-900/30 border border-gray-900 rounded-xl p-3 flex flex-col items-center justify-center backdrop-blur-sm">
            <span class="text-[10px] uppercase tracking-widest font-mono text-gray-500 font-bold">Lines Audited</span>
            <span id="statLinesScanned" class="text-xl font-black font-mono text-amber-500 mt-0.5">0</span>
        </div>
        <div class="bg-gray-900/30 border border-gray-900 rounded-xl p-3 flex flex-col items-center justify-center backdrop-blur-sm">
            <span class="text-[10px] uppercase tracking-widest font-mono text-gray-500 font-bold">Console Status</span>
            <span id="statEngineStatus" class="text-[11px] font-extrabold font-mono text-gray-400 mt-1 uppercase tracking-wide">SYSTEM READY</span>
        </div>
    </section>

    <main class="flex-1 max-w-7xl w-full mx-auto grid grid-cols-1 lg:grid-cols-2 p-4 gap-4 overflow-hidden min-h0">
        
        <section class="flex flex-col space-y-4 h-full">
            <div class="flex-1 flex flex-col min-h0">
                <label class="text-[10px] uppercase font-mono tracking-wider text-gray-500 font-black mb-1.5 flex items-center gap-1.5">
                    <span class="w-1.5 h-1.5 rounded-full bg-emerald-500"></span> 1. Backend Blueprint Source (SQL Schema / Sample API JSON)
                </label>
                <textarea id="sourceDataInput" class="w-full flex-1 p-4 bg-gray-900/40 border border-gray-900 focus:border-rose-500/40 rounded-xl font-mono text-xs text-emerald-400 focus:outline-none transition-colors resize-none shadow-inner" 
                    placeholder='Paste backend blueprint here...&#10;Misaal:&#10;{ "user_id": 101, "account_title": "Zeeshan" }'></textarea>
            </div>

            <div class="flex-1 flex flex-col min-h0">
                <label class="text-[10px] uppercase font-mono tracking-wider text-gray-500 font-black mb-1.5 flex items-center gap-1.5">
                    <span class="w-1.5 h-1.5 rounded-full bg-rose-500"></span> 2. Frontend Source Implementation File (HTML/React/JS)
                </label>
                <textarea id="frontendCodeInput" class="w-full flex-1 p-4 bg-gray-900/40 border border-gray-900 focus:border-rose-500/40 rounded-xl font-mono text-xs text-gray-300 focus:outline-none transition-colors resize-none shadow-inner" 
                    placeholder='Paste frontend code here...&#10;Misaal:&#10;<h1>{data.title}</h1>&#10;console.log(user.account_title);'></textarea>
            </div>
        </section>

        <section class="bg-gray-950/60 border border-gray-900 rounded-2xl p-5 flex flex-col h-full shadow-2xl relative backdrop-blur-lg">
            <div class="flex justify-between items-center pb-3 border-b border-gray-900 mb-4">
                <div class="flex items-center space-x-2">
                    <span class="w-2.5 h-2.5 rounded-full bg-red-500/40"></span>
                    <span class="w-2.5 h-2.5 rounded-full bg-yellow-500/40"></span>
                    <span class="w-2.5 h-2.5 rounded-full bg-green-500/40"></span>
                    <span class="text-[11px] font-mono font-bold text-gray-500 pl-2">DIAGNOSTIC_OUTPUT_STREAM</span>
                </div>
                <span class="text-[10px] text-gray-600 font-mono tracking-wider">Hover highlighted lines for prescription</span>
            </div>

            <div id="virtualEditorConsole" class="flex-1 bg-gray-950/40 rounded-xl p-4 font-mono text-xs overflow-y-auto space-y-1.5 leading-relaxed text-gray-400 border border-gray-900/40">
                <span class="text-gray-700 italic block text-center pt-20">Dono sides par files paste karein aur "Run Deep Diagnosis" button par click karein...</span>
            </div>
        </section>

    </main>

    <script>
        const sourceDataInput = document.getElementById('sourceDataInput');
        const frontendCodeInput = document.getElementById('frontendCodeInput');
        const triggerScanBtn = document.getElementById('triggerScanBtn');
        const virtualEditorConsole = document.getElementById('virtualEditorConsole');
        
        // Stats Hooks
        const statDiscovered = document.getElementById('statDiscovered');
        const statLinesScanned = document.getElementById('statLinesScanned');
        const statEngineStatus = document.getElementById('statEngineStatus');

        triggerScanBtn.addEventListener('click', executionPipelineDiagnostics);

        async function executionPipelineDiagnostics() {
            const sourceText = sourceDataInput.value.trim();
            const frontendText = frontendCodeInput.value.trim();

            if (!sourceText || !frontendText) {
                virtualEditorConsole.innerHTML = `<span class="text-orange-500 font-bold font-mono">⚠️ Process Aborted: Input fields values empty. Provide layout context assets before scanning.</span>`;
                return;
            }

            // Interface Loading State adjustments
            virtualEditorConsole.innerHTML = `<span class="text-rose-500 font-mono animate-pulse block text-center pt-20">⚙️ Compiling Data Maps & Tracking Variable Registries...</span>`;
            statEngineStatus.innerText = "RUNNING ANALYSIS...";
            statEngineStatus.className = "text-[11px] font-extrabold font-mono text-rose-500 animate-pulse";

            // Buffer structural initialization latency simulation delay
            await new Promise(resolve => setTimeout(resolve, 700));

            // Extract Keys Array from baseline source
            let registeredBackendKeys = [];
            try {
                const cleanJSON = sourceText.replace(/```json|```/g, '').trim();
                const parsedObject = JSON.parse(cleanJSON);
                if (typeof parsedObject === 'object' && parsedObject !== null) {
                    registeredBackendKeys = Array.isArray(parsedObject) && parsedObject.length > 0 ? Object.keys(parsedObject[0]) : Object.keys(parsedObject);
                }
            } catch (err) {
                // If text configuration list or SQL syntax
                const atomicWords = sourceText.split(/[\s,()]+/);
                const blacklistedSqlKeywords = ['int', 'varchar', 'text', 'datetime', 'timestamp', 'primary', 'key', 'null', 'not', 'table', 'create'];
                registeredBackendKeys = atomicWords.filter(word => /^[a-zA-Z0-9_]+$/.test(word) && word.length > 1 && !blacklistedSqlKeywords.includes(word.toLowerCase()));
            }
            registeredBackendKeys = registeredBackendKeys.map(key => key.toLowerCase());

            // Process line strings splitter loops
            const codeLinesArray = frontendText.split('\n');
            statLinesScanned.innerText = codeLinesArray.length;
            virtualEditorConsole.innerHTML = ''; // Wipe console clean for interactive sequential rendering

            let anomaliesCounter = 0;

            // Sequential line rendering sequence execution loop
            for (let index = 0; index < codeLinesArray.length; index++) {
                const rawLineContent = codeLinesArray[index];
                
                // Regular Expression mapping structure definition logic paths
                const analyticalRegex = /(?:\.|\?\.)([a-zA-Z0-9_]+)/g;
                let evaluationMatch;
                let triggerLineFaultFlag = false;
                let faultedAttributeKey = '';
                let compiledTooltipStructure = '';

                while ((evaluationMatch = analyticalRegex.exec(rawLineContent)) !== null) {
                    const trackingVariableKey = evaluationMatch[1].toLowerCase();
                    const nativeJsProtectedMethods = ['map', 'length', 'log', 'push', 'data', 'response', 'res', 'json', 'stringify', 'parse'];

                    if (!nativeJsProtectedMethods.includes(trackingVariableKey) && registeredBackendKeys.length > 0 && !registeredBackendKeys.includes(trackingVariableKey)) {
                        triggerLineFaultFlag = true;
                        anomaliesCounter++;
                        faultedAttributeKey = evaluationMatch[1];

                        // Calculate closest structural proxy suggestion alternative match (Fuzzy string parsing match)
                        const operationalAlternativeMatch = registeredBackendKeys.find(bKey => bKey.includes(trackingVariableKey) || trackingVariableKey.includes(bKey));
                        const recommendationResolutionText = operationalAlternativeMatch ? `Replace .${faultedAttributeKey} with .${operationalAlternativeMatch}` : `Confirm matching key inside backend structure mapping schemas`;

                        // Compile structural components for absolute floating custom UI Tooltip overlays
                        compiledTooltipStructure = `
                            <div class="diagnostic-tooltip bg-gray-900 border border-rose-500/40 p-3.5 rounded-xl shadow-2xl text-gray-100 w-64 font-sans space-y-1.5 transition-all">
                                <div class="font-black text-rose-400 text-[10px] tracking-wider uppercase font-mono">🩺 Mismatch Correction</div>
                                <div class="text-[11px] text-gray-300 leading-relaxed">Property key <span class="font-mono text-white underline font-bold">"${faultedAttributeKey}"</span> missing in reference backend blueprints.</div>
                                <div class="text-[11px] text-emerald-400 font-mono pt-1.5 border-t border-gray-800/80 font-bold">${recommendationResolutionText}</div>
                            </div>
                        `;
                    }
                }

                // Append line items layouts constructs components structures to active view elements tree
                const lineRowElementWrapper = document.createElement('div');
                lineRowElementWrapper.className = `code-line px-3 py-1 font-mono text-[11px] flex items-start space-x-4 opacity-0 text-gray-400 transition-colors duration-200`;
                
                if (triggerLineFaultFlag) {
                    lineRowElementWrapper.classList.add('line-fault-highlight');
                }

                const protectedCodeLineHTML = rawLineContent.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");

                lineRowElementWrapper.innerHTML = `
                    <span class="text-gray-700 select-none text-right w-7 border-r border-gray-900 pr-2.5 font-mono text-[10px] block pt-0.5">${index + 1}</span>
                    <span class="${triggerLineFaultFlag ? 'text-rose-300 font-bold' : 'text-gray-400'} flex-1 whitespace-pre-wrap block font-mono">${protectedCodeLineHTML || ' '}</span>
                    ${triggerLineFaultFlag ? `<span class="text-rose-500 font-bold select-none cursor-help text-xs animate-pulse">⚠️</span>` : ''}
                    ${compiledTooltipStructure}
                `;

                virtualEditorConsole.appendChild(lineRowElementWrapper);
                lineRowElementWrapper.classList.add('animate-cascade');

                // Fast incremental rendering stagger velocity loop timeouts values
                await new Promise(resolve => setTimeout(resolve, 45));
            }

            // Sync metrics tallies data logs adjustments back onto view fields dashboard interfaces
            statDiscovered.innerText = anomaliesCounter;
            
            if (anomaliesCounter > 0) {
                statEngineStatus.innerText = `${anomaliesCounter} FAULTS FOUND`;
                statEngineStatus.className = "text-[11px] font-extrabold font-mono text-rose-500 uppercase tracking-wide";
            } else {
                statEngineStatus.innerText = "SYSTEM SECURE ✓";
                statEngineStatus.className = "text-[11px] font-extrabold font-mono text-emerald-400 uppercase tracking-wide";
                virtualEditorConsole.innerHTML = `
                    <div class="p-4 bg-emerald-950/20 border border-emerald-900/30 rounded-xl text-emerald-400 font-bold text-center font-mono text-xs my-20 max-w-sm mx-auto shadow-lg">
                        ✓ CONNECTION MARSHAL SECURE<br>
                        <span class="text-[11px] font-normal text-gray-400 mt-1 block">Dono data points perfect align hain. Frontend perfectly matches Backend keys!</span>
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
